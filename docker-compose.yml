services:
  nginx:
    image: nginx:alpine
    container_name: todo_nginx
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - todo_network
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: todo_php
    user: "1000:1000"
    environment:
      - HOME=/tmp/var/www/html
    ports:
      - "5173:5173"
    volumes:
      - ./src:/var/www/html
    networks:
      - todo_network
  mysql:
    image: mysql:8.0
    container_name: todo_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: todo_db
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_USER: todo_user
      MYSQL_PASSWORD: todo_pass
    ports:
      - "3306:3306"
    volumes:
      - todo_mysql_data:/var/lib/mysql
    networks:
      - todo_network
networks:
  todo_network:
    driver: bridge
volumes:
  todo_mysql_data:
    driver: local